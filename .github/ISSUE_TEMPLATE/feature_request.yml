name: Feature request
description: Suggest an improvement to the skill or its content
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: gap
    attributes:
      label: What's the gap
      description: What's missing or could be better — a technique, a worked example, a model profile, an output behavior.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What you'd like to see.
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source / rationale
      description: If it's a technique or claim, link the primary source (paper, vendor doc). This skill stays grounded in cited sources.
      placeholder: "https://..."
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Anything else
      description: Context, examples, alternatives considered.
    validations:
      required: false
